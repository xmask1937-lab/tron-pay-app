name: tron_pay_app
description: A full-featured Tron USDT + TRX payment prototype app with Solana support.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  shared_preferences: ^2.2.2
  bip39: ^1.0.4
  provider: ^6.1.1
  fluttertoast: ^8.2.2
  # For Solana support
  solana: ^0.3.0
  # For animations and better UI
  lottie: ^3.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/